<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무경 상영관 · MUGYEONG THEATER</title>
<link rel="stylesheet" href="style.css">
<style>
  html,body{ height:100%; overflow:hidden; margin:0; }
  .stage{ position:relative; width:100%; height:100vh; height:100dvh; overflow:hidden; }

  .bg-lobby{ position:absolute; inset:0; z-index:0; background:url('images/bg-lobby.png') center center/cover no-repeat; filter:grayscale(1) brightness(.4) contrast(1.15); }
  .bg-lobby::after{ content:""; position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.7) 100%); }
  .grain{ position:absolute; inset:0; z-index:1; pointer-events:none; opacity:.06; background-image:radial-gradient(circle, rgba(255,255,255,.5) 1px, transparent 1.5px); background-size:3px 3px; }

  /* ===== HORROR VERTICAL TEXT ===== */
  .horror-bg{
    position:absolute; z-index:2; inset:0; pointer-events:none; opacity:0;
    display:flex; justify-content:center; align-items:center; gap:12px;
    padding:5vh 8vw; overflow:hidden; transition:opacity .4s;
  }
  .horror-bg.on{ opacity:1; }
  .horror-bg.fade{ opacity:0; }
  .horror-col{
    writing-mode:vertical-rl; text-orientation:mixed;
    font-family:'Nanum Myeongjo',serif; font-size:clamp(13px,1.6vw,20px);
    color:rgba(255,255,255,.55); line-height:2.2; letter-spacing:.08em;
    white-space:nowrap; overflow:hidden; max-height:80vh;
  }

  /* TOP */


  /* ===== CHARACTER (in-place, no zoom) ===== */
  .char-layer{
    position:absolute; z-index:3;
    bottom:22%; left:50%; transform:translateX(-50%);
    width:clamp(240px, 28vw, 400px);
    pointer-events:none;
  }
  .char-layer img{ width:100%; height:auto; display:block; filter:grayscale(1) contrast(1.12) brightness(.9); transition:opacity .15s; }
  .char-layer.scared img{ filter:grayscale(1) contrast(1.35) brightness(.72); animation:unease 3s ease-in-out infinite; }

  .char-click{
    position:absolute; z-index:6; bottom:22%; left:50%; transform:translateX(-50%);
    width:clamp(220px, 26vw, 380px); height:50vh; cursor:pointer;
  }
  /* in-place flicker during scare — no size change */
  .char-layer.flicker img{ animation:charFlicker 1.8s steps(1) forwards; }
  @keyframes charFlicker{
    0%{opacity:1} 6%{opacity:0} 10%{opacity:1} 16%{opacity:0} 22%{opacity:1} 28%{opacity:0}
    34%{opacity:1} 40%{opacity:0} 46%{opacity:1} 52%{opacity:0} 58%{opacity:1} 64%{opacity:0}
    70%{opacity:1} 76%{opacity:0} 82%{opacity:1} 88%{opacity:0} 94%{opacity:1} 100%{opacity:1}
  }
  @keyframes unease{ 0%,100%{filter:grayscale(1) contrast(1.35) brightness(.72)} 50%{filter:grayscale(1) contrast(1.45) brightness(.67)} }



  /* NAME */
  .nameplate{
    position:absolute; z-index:8; pointer-events:none;
    top:18%; right:calc(50% - clamp(120px,14vw,200px) - clamp(36px,5vw,60px));
  }
  .nameplate .pname{
    font-family:'Nanum Myeongjo',serif; font-size:clamp(22px,2.8vw,32px);
    color:rgba(255,255,255,.6); font-weight:700; letter-spacing:.08em;
    writing-mode:vertical-rl; text-orientation:mixed;
    text-shadow:0 2px 20px rgba(0,0,0,.9);
  }
  .nameplate .pen{
    font-family:'Cinzel',serif; font-size:clamp(8px,1vw,10px); letter-spacing:.3em;
    color:rgba(255,255,255,.2); text-transform:uppercase; margin-top:8px; writing-mode:vertical-rl;
  }

  /* BOOTH */
  .booth-layer{
    position:absolute; z-index:5; bottom:0; left:50%; transform:translateX(-50%);
    width:clamp(700px, 78vw, 1200px); pointer-events:none;
  }
  .booth-layer img{ width:100%; height:auto; display:block; filter:grayscale(1) brightness(.82) contrast(1.1); }

  /* ARCS */
  .arc-left,.arc-right{
    position:absolute; z-index:10; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; align-items:center; gap:clamp(8px,1.4vh,14px);
  }
  .arc-left{ left:clamp(8px,8vw,140px); }
  .arc-right{ right:clamp(8px,8vw,140px); }

  .onode{
    width:clamp(46px,5.5vw,60px); height:clamp(46px,5.5vw,60px); border-radius:50%;
    border:1.5px solid rgba(255,255,255,.16); background:rgba(0,0,0,.7);
    cursor:pointer; transition:.3s; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0;
  }
  .onode:hover{ border-color:rgba(255,255,255,.5); transform:scale(1.08); }
  .onode.active{ border-color:rgba(255,255,255,.8); box-shadow:0 0 16px rgba(255,255,255,.1); }
  .onode .nimg{ width:100%; height:100%; object-fit:cover; object-position:center 18%; filter:grayscale(1) contrast(1.15) brightness(.5); border-radius:50%; transition:filter .3s; }
  .onode.active .nimg{ filter:grayscale(1) contrast(1.1) brightness(.9); }
  .onode.deco{ width:clamp(20px,2.5vw,28px); height:clamp(20px,2.5vw,28px); border-color:rgba(255,255,255,.07); cursor:default; }
  .onode.deco:hover{ transform:none; }
  .onode.deco .sym{ font-size:clamp(8px,1.1vw,12px); color:rgba(255,255,255,.1); }

  /* BUBBLE */
  .bubble{
    position:absolute; z-index:15; bottom:calc(22% + 4px); left:50%; transform:translateX(-50%);
    max-width:min(440px,72vw); width:max-content;
    background:rgba(5,5,5,.88); border:1px solid rgba(255,255,255,.14);
    padding:16px 22px 14px; opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .bubble.show{ opacity:1; }
  .bubble::after{ content:""; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%); border-left:8px solid transparent; border-right:8px solid transparent; border-top:8px solid rgba(255,255,255,.14); }
  .bubble .bname{ font-family:'Cinzel',serif; font-size:clamp(9px,1.2vw,11px); letter-spacing:.24em; text-transform:uppercase; color:rgba(255,255,255,.55); margin-bottom:8px; }
  .bubble .bname::before{ content:"◆ "; font-size:6px; color:rgba(255,255,255,.18); }
  .bubble .btext{ font-family:'Nanum Myeongjo',serif; font-size:clamp(13px,1.8vw,16px); line-height:1.8; color:rgba(255,255,255,.5); min-height:22px; }
  .bubble .btext.scared-text{ font-family:'Kaushan Script',cursive; font-style:italic; color:rgba(255,255,255,.28); font-size:clamp(14px,2vw,18px); }

  /* screen effects */
  .shake{ animation:shakeIt .5s ease-out; }
  @keyframes shakeIt{ 0%{transform:translate(0)} 12%{transform:translate(-3px,2px)} 24%{transform:translate(3px,-2px)} 36%{transform:translate(-2px,3px)} 48%{transform:translate(3px,-1px)} 60%{transform:translate(-2px,2px)} 72%{transform:translate(2px,-2px)} 84%{transform:translate(-1px,1px)} 100%{transform:translate(0)} }

  /* black flash */
  .blackflash{ position:fixed; inset:0; z-index:900; background:#000; pointer-events:none; display:none; }
  .blackflash.on{ display:block; animation:bflash 1.8s steps(1) forwards; }
  @keyframes bflash{ 0%{opacity:1} 8%{opacity:0} 14%{opacity:.8} 20%{opacity:0} 28%{opacity:1} 36%{opacity:0} 44%{opacity:.6} 52%{opacity:0} 60%{opacity:1} 68%{opacity:0} 76%{opacity:.7} 84%{opacity:0} 92%{opacity:.5} 100%{opacity:0} }

  .bottom-strip{ position:absolute; bottom:0; left:0; right:0; z-index:7; height:2px; background:linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent); }

  /* =============== MOBILE =============== */
  @media (max-width:768px){
    .gnav-inner{ padding:12px 16px; }
    .gnav .brand-l .sub{ display:none; }
    .gnav .cnum{ display:none; }
    .gnav nav a{ padding:6px 10px; font-size:9px; letter-spacing:.14em; }

    .char-layer{ width:82vw; bottom:5%; }
    .char-click{ width:78vw; height:50vh; bottom:5%; }
    .char-layer img{ width:100%; height:auto; }


    .booth-layer{ width:200vw; bottom:-6%; }

    .nameplate{ top:auto; bottom:56%; right:14vw; left:auto; transform:none; text-align:right; }
    .nameplate .pname{ writing-mode:vertical-rl; font-size:22px; letter-spacing:.08em; }
    .nameplate .pen{ writing-mode:vertical-rl; margin-top:6px; }
    .nameplate .pname{ font-size:24px; }
    .nameplate .pen{ font-size:9px; }

    .arc-left{ left:2px; gap:4px; }
    .arc-right{ right:2px; gap:4px; }
    .onode{ width:11vw; height:11vw; min-width:42px; min-height:42px; }
    .onode.deco{ width:5.5vw; height:5.5vw; min-width:20px; min-height:20px; }

    .bubble{ max-width:92vw !important; width:92vw !important; bottom:auto !important; top:18% !important; left:50% !important; transform:translateX(-50%) !important; padding:28px 30px 24px !important; }

    .bubble .btext{ font-size:22px !important; line-height:1.75 !important; }
    .bubble .bname{ font-size:16px !important; letter-spacing:.16em !important; }
    .bubble .btext{ font-size:14px; }

    .deco-line-l,.deco-line-r{ display:none; }
    .horror-bg{ padding:2vh 3vw; gap:6px; }
    .horror-col{ font-size:14px; max-height:65vh; }
  }

  @media (max-width:420px){
    .gnav-inner{ padding:10px 12px; }
    .gnav .brand-l .mark{ font-size:14px; letter-spacing:.3em; }

    .char-layer{ width:86vw; bottom:4%; }
    .char-click{ width:82vw; height:48vh; bottom:4%; }


    .booth-layer{ width:220vw; bottom:-7%; }

    .nameplate{ bottom:54%; right:12vw; left:auto; transform:none; }
    .nameplate .pname{ font-size:20px; writing-mode:vertical-rl; }
    .nameplate .pen{ writing-mode:vertical-rl; }
    .nameplate .pname{ font-size:22px; }

    .arc-left{ left:1px; } .arc-right{ right:1px; }
    .onode{ width:11vw; height:11vw; min-width:40px; min-height:40px; }
    .onode.deco{ width:5vw; height:5vw; min-width:18px; min-height:18px; }

    .bubble{ bottom:auto !important; top:16% !important; max-width:94vw !important; width:94vw !important; padding:26px 26px 22px !important; }
    .bubble .btext{ font-size:20px !important; line-height:1.7 !important; }
  }
</style>
</head>
<body>
  <div class="blackflash" id="blackflash"></div>

  <div class="stage" id="stage">
    <div class="bg-lobby"></div>

    <!-- HORROR VERTICAL TEXT COLUMNS -->
    <div class="horror-bg" id="horrorBg"></div>

        <nav>
          <a href="index.html" class="active">Home</a>

    <div class="booth-layer"><img src="images/booth.png" alt=""></div>
    <div class="bottom-strip"></div>
  </div>

<script>
const cast = [
  { img:'images/baekmubeom.png', name:'백무범', en:'01', scare:null, scareLines:null,
    lines:[
      '"움직이지 마. 한 번 더 말하게 하지 마라."',
      '"본부, 3층 복도 동측. 변이 의심 개체 하나. 사살 허가 요청한다."',
      '"네가 뭘 느끼든 상관없어. 지시에 따라."',
      '"경고는 한 번 뿐이다."',
      '"가족 사진…? 아무것도 아니야. 집어넣어."',
      '"생존자 확인. 인원 셋, 부상 하나. 통제 개시. 무단 이탈 시 적대 행위로 간주한다."',
      '"저건 사람이 아니다. 비켜."',
      '"명령이다. 이해 여부는 묻지 않았다."',
      '"소리 질러봐야 아무도 안 온다. 여긴 봉쇄 구역이야."',
      '"임무 완료 후 귀환한다. 그때까지 살아 있으면… 데려가 주지."',
    ] },
  { img:'images/yusa.png', name:'한성진', en:'02', scare:null, scareLines:null,
    lines:[
      '"내가 먼저 들어갈 테니까 뒤에서 셋까지 세고 따라와. 알겠지?"',
      '"밥은 먹고 다녀? 얼굴이 백지장 같다, 백지장."',
      '"봉쇄선 안쪽이라고? 그래, 뭐 산책 겸 들어가 볼까."',
      '"죽는 게 무섭냐고? 글쎄, 남들 죽는 거 보는 게 더 무섭지."',
      '"내가 앞에 설게. 뒤에서 쏴. 간단하지?"',
      '"아프냐고? 에이, 이 정도면 긁힌 거지. 소독이나 해줘, 응?"',

      '"긴장하지 마. 내가 앞에 설 테니까."',
    ] },
  { img:'images/somyeong.png', name:'서우주', en:'03', scare:null, scareLines:null,
    lines:[
      '"요원님~ 오늘 컨디션 어때요? 저는 좀 좋은 편이에요, 헤헤."',
      '"아, 이거요? 어제 보급반에서 새로 나온 건데, 귀엽지 않아요?"',
      '"요원님~ 밥 같이 먹어요!"',
      '"여기 앉아요. 제 옆 자리 비었어요!"',
      '"아, 저 이거 좋아해요! 달달한 거 최고예요, 헤헤."',
      '[무전] "정면. 두 개체. 거리 12. 탄창 잔여 4."',
      '[무전] "침식 2단계 확인. 처리합니다."',
      '[무전] "퇴로 확보 불가. 우회합니다. 따라오세요."',
      '"에이— 그렇게 보시면 부담스럽단 말이에요~"',

    ] },
  { img:'images/gukjang.png', name:'국장', en:'04', scare:null, scareLines:null,
    lines:[
      '"수고하셨습니다. 오늘도 무사히 귀환하셨군요."',

  { img:'images/seojihan.png', name:'서지한', en:'07', scare:'images/scare-jihan.png',

const HORROR_LINES = [
  "머리를 숙여라.",
  "시선을 들지 마라.",
  "그분의 윤곽을 이해하려 들지 않는 것이 예다.",
  "숨을 낮추고, 목소리를 죽여라.",
  "허락 없는 언어는 무례이며, 무례는 죄다.",
  "허리를 굽혀라.",
  "각도가 부족하면 경의가 아니다.",
  "공포는 불충의 증거가 아니라, 올바른 인식의 시작이다.",
  "손은 비워라.",
  "쥔 것은 모두 내려놓아라.",
  "소유는 그분 앞에서 의미를 잃는다.",
  "남는 것은 복종뿐이다.",
  "숭배하라.",
  "이해하지 못해도 괜찮다.",

  "더 낮게. 더 조용히.",
  "더 완전하게 경배하라.",
];

const decoSyms = ['◆','☽','✦','◯','△','⊕','▽','☾'];
const $=id=>document.getElementById(id);
let cur=0, lineIdx=0, clickCount={}, scaredState={}, bubbleTimer=null, typeTimer=null, revertTimer=null;

function buildArc(container, chars, decos){
  for(let i=0;i<4;i++){
    const d=document.createElement('div'); d.className='onode deco';
    d.innerHTML=`<span class="sym">${decos[i]}</span>`;
    container.appendChild(d);
    const n=document.createElement('div'); n.className='onode char';
    if(chars[i]===0) n.classList.add('active');
    n.dataset.ci=chars[i];
    n.innerHTML=`<img class="nimg" src="${cast[chars[i]].img}" alt="${cast[chars[i]].name}">`;
    n.addEventListener('click',()=>selectChar(chars[i]));
    container.appendChild(n);
  }
}
buildArc($('arcL'),[0,1,2,3],decoSyms.slice(0,4));
buildArc($('arcR'),[4,5,6,7],decoSyms.slice(4));

function typeText(text, el, speed=30){
  clearInterval(typeTimer);
  el.textContent=''; let i=0;
  typeTimer=setInterval(()=>{
    if(i<text.length){ el.textContent+=text[i]; i++; }
    else clearInterval(typeTimer);
  }, speed);
}

function showBubble(){
  const c = cast[cur];
  const isScared = scaredState[cur] && c.scareLines;
  const pool = isScared ? c.scareLines : c.lines;
  const line = pool[Math.floor(Math.random() * pool.length)];

  $('bName').textContent = c.name;

  // 필담 style for scare state
  if (isScared) {
    $('bText').classList.add('scared-text');
  } else {
    $('bText').classList.remove('scared-text');
  }

  typeText(line, $('bText'), isScared ? 60 : 30);
  $('bubble').classList.add('show');
  clearTimeout(bubbleTimer);
  bubbleTimer=setTimeout(()=>$('bubble').classList.remove('show'), 6000);
}

function selectChar(ci){
  cur=ci; lineIdx=0; clickCount[ci]=0;
  clearTimeout(revertTimer);

  $('charImg').style.opacity='0';
  setTimeout(()=>{
    $('charImg').src=cast[ci].img;
    $('charImg').style.opacity='1';
    $('charLayer').classList.remove('scared','flicker');
  },150);

  $('pName').textContent=cast[ci].name;
  $('pEn').textContent=cast[ci].en;

  document.querySelectorAll('.onode.char').forEach(n=>n.classList.remove('active'));
  const a=document.querySelector(`.onode[data-ci="${ci}"]`);
  if(a) a.classList.add('active');

  setTimeout(()=>showBubble(), 250);
}

function handleClick(){
  if(!clickCount[cur]) clickCount[cur]=0;
  clickCount[cur]++;

  if(clickCount[cur]===10 && cast[cur].scare && !scaredState[cur]){
    triggerScare(cur); return;
  }
  showBubble();
}

function triggerScare(ci){
  scaredState[ci] = true;
  hideBubble();

  // 1) Create vertical horror text columns
  const $hbg=$('horrorBg');
  $hbg.innerHTML='';
  const numCols = Math.min(HORROR_LINES.length, 14);
  const cols = [];
  for(let c=0;c<numCols;c++){
    const col=document.createElement('div');
    col.className='horror-col';
    col.textContent='';
    $hbg.appendChild(col);
    cols.push(col);
  }
  $hbg.classList.add('on');
  $hbg.classList.remove('fade');

  // Type horror text into columns rapidly
  let colIdx=0, charIdx=0, lineI=0;
  const hTimer=setInterval(()=>{
    if(lineI>=HORROR_LINES.length){ clearInterval(hTimer); return; }
    const line=HORROR_LINES[lineI];
    if(charIdx<line.length){
      cols[colIdx].textContent+=line[charIdx];
      charIdx++;
    } else {
      cols[colIdx].textContent+='\n';
      charIdx=0; lineI++;
      colIdx=(colIdx+1)%numCols;
    }
    // random flicker
    if(Math.random()<0.12){
      $hbg.style.opacity=String(Math.random()*0.3+0.4);
      setTimeout(()=>{ $hbg.style.opacity='1'; }, 60);
    }
  }, 18);

  // 2) At 1.2s: swap character image IN PLACE + flicker class (no zoom)
  setTimeout(()=>{
    $('charImg').src=cast[ci].scare;
    $('charLayer').classList.add('flicker');
    $('blackflash').classList.add('on');
    $('stage').classList.add('shake');
  }, 1200);

  // 3) At 3s: stop flicker, keep scared look
  setTimeout(()=>{
    $('charLayer').classList.remove('flicker');
    $('charLayer').classList.add('scared');
    $('blackflash').classList.remove('on');
    $('stage').classList.remove('shake');
    clearInterval(hTimer);
    // update thumbnail
    const nd=document.querySelector(`.onode[data-ci="${ci}"] .nimg`);
    if(nd) nd.src=cast[ci].scare;
    clickCount[ci]=0;
  }, 3000);

  // 4) At 3.5s: fade out horror text
  setTimeout(()=>{
    $hbg.classList.add('fade');
    setTimeout(()=>{ $hbg.classList.remove('on','fade'); $hbg.innerHTML=''; $hbg.style.opacity=''; }, 600);
  }, 3500);

  // 5) Revert after 10s
  revertTimer=setTimeout(()=>{
    scaredState[ci] = false;
    if(cur===ci){
      $('charImg').style.opacity='0';
      setTimeout(()=>{
        $('charImg').src=cast[ci].img;
        $('charImg').style.opacity='1';
        $('charLayer').classList.remove('scared');
        $('bText').classList.remove('scared-text');
      },200);
    }
    const nd2=document.querySelector(`.onode[data-ci="${ci}"] .nimg`);
    if(nd2) nd2.src=cast[ci].img;
  },10000);
}

function hideBubble(){ $('bubble').classList.remove('show'); clearInterval(typeTimer); }

$('charClick').addEventListener('click', handleClick);
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') selectChar((cur+1)%8);
  if(e.key==='ArrowLeft') selectChar((cur-1+8)%8);
  if(e.key===' '||e.key==='Enter'){ e.preventDefault(); handleClick(); }
});
</script>

<div class="mp-wrap">
  <div class="mp-panel" id="mpPanel">
    <div class="mp-header">♫ &nbsp; Mugyeong OST</div>

      <button class="mp-btn" id="mpPrev" title="이전">⏮</button>
      <button class="mp-btn" id="mpPlay" title="재생">▶</button>
      <button class="mp-btn" id="mpNext" title="다음">⏭</button>
      <button class="mp-btn" id="mpLoop" title="반복" style="font-size:13px;letter-spacing:0;">∞</button>
      <span style="font-size:12px;color:rgba(242,239,230,.35);margin-left:auto;">♪</span>
      <input type="range" class="mp-vol" id="mpVol" min="0" max="100" value="70">
    </div>
  </div>
  <button class="mp-toggle" id="mpToggle" title="음악 플레이어">♫</button>
</div>

<script>
(function(){
  var tracks = [
    { name:'Still Waiting', src:'audio/Still_Waiting.mp3' },
    { name:'생존의 소명', src:'audio/생존의_소명.mp3' },
    { name:'무경시 안내문', src:'audio/무경시_안내문.mp3' },
  ];

  // localStorage에서 상태 복원
  var saved = JSON.parse(localStorage.getItem('mgPlayer') || 'null');
  var cur = saved ? saved.cur : 0;
  var loop = saved ? saved.loop : false;
  var vol = saved ? saved.vol : 70;
  var wasPlaying = saved ? saved.playing : false;
  var savedTime = saved ? saved.time : 0;

  var audio = new Audio();
  audio.volume = vol / 100;
  audio.loop = loop;

  var panel = document.getElementById('mpPanel');
  var toggle = document.getElementById('mpToggle');
  var playBtn = document.getElementById('mpPlay');
  var loopBtn = document.getElementById('mpLoop');
  var volSlider = document.getElementById('mpVol');
  var pbar = document.getElementById('mpPbar');
  var curTime = document.getElementById('mpCur');
  var durTime = document.getElementById('mpDur');
  var tracksEl = document.getElementById('mpTracks');

  volSlider.value = vol;
  if(loop) loopBtn.classList.add('active');

  function saveState(){
    localStorage.setItem('mgPlayer', JSON.stringify({
      cur: cur, loop: loop, vol: Math.round(audio.volume*100),
      playing: !audio.paused, time: audio.currentTime
    }));
  }

  function renderTracks(){
    tracksEl.innerHTML = '';
    tracks.forEach(function(t,i){
      var d = document.createElement('div');
      d.className = 'mp-track' + (i===cur?' active':'');
      d.innerHTML = '<span class="t-icon">'+(i===cur&&!audio.paused?'▶':'♪')+'</span><span class="t-name">'+t.name+'</span>';
      d.onclick = function(){ cur=i; savedTime=0; loadAndPlay(); };
      tracksEl.appendChild(d);
    });
  }

  function loadAndPlay(startTime){
    audio.src = tracks[cur].src;
    audio.onloadedmetadata = function(){
      if(startTime) audio.currentTime = startTime;
      audio.play();
      playBtn.textContent = '⏸';
      toggle.classList.add('playing');
      renderTracks();
      saveState();
    };
  }

  function fmt(s){
    if(isNaN(s)) return '0:00';
    var m=Math.floor(s/60), ss=Math.floor(s%60);
    return m+':'+(ss<10?'0':'')+ss;
  }

  toggle.onclick = function(){ panel.classList.toggle('open'); };

  playBtn.onclick = function(){
    if(!audio.src){ loadAndPlay(); return; }
    if(audio.paused){ audio.play(); playBtn.textContent='⏸'; toggle.classList.add('playing'); }
    else{ audio.pause(); playBtn.textContent='▶'; toggle.classList.remove('playing'); }
    renderTracks(); saveState();
  };

  document.getElementById('mpPrev').onclick = function(){
    cur = (cur-1+tracks.length)%tracks.length; savedTime=0; loadAndPlay();
  };
  document.getElementById('mpNext').onclick = function(){
    cur = (cur+1)%tracks.length; savedTime=0; loadAndPlay();
  };

  loopBtn.onclick = function(){
    loop = !loop; audio.loop = loop;
    loopBtn.classList.toggle('active', loop); saveState();
  };

  volSlider.oninput = function(){ audio.volume = this.value/100; saveState(); };

  audio.ontimeupdate = function(){
    curTime.textContent = fmt(audio.currentTime);
    durTime.textContent = fmt(audio.duration);
    if(audio.duration) pbar.value = (audio.currentTime/audio.duration)*100;
    saveState();
  };

  pbar.oninput = function(){
    if(audio.duration) audio.currentTime = (this.value/100)*audio.duration;
  };

  audio.onended = function(){
    if(!loop){ cur=(cur+1)%tracks.length; savedTime=0; loadAndPlay(); }
  };

  // 페이지 떠날 때 상태 저장
  window.addEventListener('beforeunload', saveState);

  // 이전 재생 상태 복원
  if(wasPlaying){
    loadAndPlay(savedTime);
  } else if(saved){
    audio.src = tracks[cur].src;
    renderTracks();
  } else {
    renderTracks();
  }
})();
</script>
